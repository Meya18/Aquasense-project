<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>HydraSense</title>
    <link rel="stylesheet" href="/static/css/style.css">
</head>
<body>

    <div id="page-profil">
        <div class="logo-header">
            <h1>🌊 HydraSense</h1>
            <p>Surveillez la qualité de l'eau, protégez la vie aquatique.</p>
        </div>

        <div class="choix-container">
            <h2>Choisissez votre profil</h2>

            <a href="/pecheur" class="profil-card">
                <span class="profil-icon">🎣</span>
                <div>
                    <h3>Pêcheur</h3>
                    <p>Surveillez vos zones de pêche et recevez des alertes.</p>
                </div>
            </a>

            <a href="/ong" class="profil-card">
                <span class="profil-icon">🌿</span>
                <div>
                    <h3>ONG / Scientifique</h3>
                    <p>Suivez les données, analysez et contribuez à la protection des écosystèmes.</p>
                </div>
            </a>

            <a href="/pecheur" class="invite">Invité (accès limité)</a>
        </div>
    </div>

    <script src="/static/js/script.js"></script>
</body>
</html>
